// â”€â”€â”€ PIXEL ART PAINTER â”€â”€â”€
function drawPixel(canvas, pixels, palette) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pH = pixels.length, pW = pixels[0].length;
  const sw = W/pW, sh = H/pH;
  ctx.clearRect(0,0,W,H);
  for(let r=0;r<pH;r++) for(let c=0;c<pW;c++) {
    const k = pixels[r][c];
    if(k === '.') continue;
    ctx.fillStyle = palette[k];
    ctx.fillRect(Math.round(c*sw), Math.round(r*sh), Math.ceil(sw), Math.ceil(sh));
  }
}

function drawIcon(canvas, iconKey) {
  const icon = ICONS[iconKey];
  if(!icon) return;
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const rows=icon.p.length, cols=icon.p[0].length;
  const sw=W/cols, sh=H/rows;
  ctx.clearRect(0,0,W,H);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const k=icon.p[r][c];
      if(k==='.' || k===' ') continue;
      ctx.fillStyle = icon.c[k]||'#888';
      ctx.fillRect(Math.round(c*sw),Math.round(r*sh),Math.ceil(sw),Math.ceil(sh));
    }
  }
}

let state = {

  chapterIdx: 0,
  choices: [],

};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(id === 'select') renderSelect();
}

// Draw emperor card portraits
function renderSelect() {
  const grid = document.getElementById('emperors-grid');
  grid.innerHTML = '';
  EMPERORS.forEach(emp => {
    const card = document.createElement('div');
    card.className = 'emperor-card';
    card.onclick = () => startEmperor(emp.id);

    const cvs = document.createElement('canvas');
    cvs.width = 126; cvs.height = 140;
    drawPixelScaled(cvs, emp.pix, emp.pal);

    const name = document.createElement('div');
    name.className = 'emperor-name';
    name.textContent = emp.name;

    const dates = document.createElement('div');
    dates.className = 'emperor-dates';
    dates.textContent = emp.dates;

    const role = document.createElement('div');
    role.className = 'emperor-role';
    role.textContent = emp.role;

    card.appendChild(cvs);
    card.appendChild(name);
    card.appendChild(dates);
    card.appendChild(role);
    grid.appendChild(card);
  });
}

function drawPixelScaled(canvas, pixels, palette) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pH = pixels.length, pW = pixels[0].length;
  const sw = W/pW, sh = H/pH;
  ctx.clearRect(0,0,W,H);
  for(let r=0;r<pH;r++){
    for(let c=0;c<pW;c++){
      const k = pixels[r][c];
      if(k === '.') continue;
      ctx.fillStyle = palette[k]||'#888';
      ctx.fillRect(Math.round(c*sw), Math.round(r*sh), Math.ceil(sw), Math.ceil(sh));
    }
  }
}

function startEmperor(id) {
  state.emperor = EMPERORS.find(e => e.id === id);
  state.chapterIdx = 0;
  state.choices = [];
  state.selectedChoice = null;
  showScreen('story');
  renderStoryScreen();
}

function restartEmperor() {
  if(state.emperor) startEmperor(state.emperor.id);
}

function renderStoryScreen() {
  const emp = state.emperor;
  const ch = emp.chapters[state.chapterIdx];

  // Header portrait
  const portrait = document.getElementById('story-portrait');
  drawPixelScaled(portrait, emp.pix, emp.pal);

  document.getElementById('story-name').textContent = emp.name.toUpperCase();
  document.getElementById('story-level').textContent = `CHAPTER ${state.chapterIdx+1} OF ${emp.chapters.length}`;

  document.getElementById('scene-title').textContent = ch.title;
  document.getElementById('scene-text').textContent = ch.text;

  // Hide effect
  document.getElementById('effect-box').classList.remove('visible');
  document.getElementById('effect-desc').textContent = '';

  // Render choices
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  state.selectedChoice = null;

  ch.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = (i===0?'â–¸ ':'â–¸ ') + c.label;
    btn.onclick = () => selectChoice(i, btn);
    area.appendChild(btn);
  });

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('visible');
}

function selectChoice(idx, btn) {
  const emp = state.emperor;
  const ch = emp.chapters[state.chapterIdx];
  const choice = ch.choices[idx];
  state.selectedChoice = idx;

  // Visual selection
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  // Show effect
  const box = document.getElementById('effect-box');
  document.getElementById('effect-desc').textContent = choice.effect;

  const ecvs = document.getElementById('effect-canvas');
  drawIcon(ecvs, choice.icon);

  box.classList.add('visible');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('visible');
  nextBtn.textContent = state.chapterIdx < emp.chapters.length-1 ? 'CONTINUE â€ş' : 'WITNESS YOUR LEGACY â€ş';
}

function advanceScene() {
  if(state.selectedChoice === null) return;
  state.choices.push(state.selectedChoice);
  state.chapterIdx++;

  if(state.chapterIdx >= state.emperor.chapters.length) {
    showEnding();
  } else {
    state.selectedChoice = null;
    renderStoryScreen();
    document.getElementById('screen-story').scrollTop = 0;
  }
}

function showEnding() {
  showScreen('end');
  const emp = state.emperor;
  // Glory if more choices were "0" (first choice = peace/culture), else conflict
  const gloryVotes = state.choices.filter(c => c===0).length;
  const ending = gloryVotes >= 2 ? emp.endings.glory : emp.endings.conflict;

  document.getElementById('end-laurel').textContent = emp.id==='nero' ? 'đźŽ­ đź”Ą đźŽ­' : emp.id==='constantine' ? 'âśť đź¦… âśť' : 'đźŚż đź¦… đźŚż';
  document.getElementById('end-title').textContent = ending.title;
  document.getElementById('end-outcome').textContent = ending.outcome;
  document.getElementById('end-text').textContent = ending.text;
}
